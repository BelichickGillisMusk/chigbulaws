  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gold corner accents -->
  <rect x="0" y="0" width="1200" height="6" fill="#f3d488"/>
  <rect x="0" y="624" width="1200" height="6" fill="#f3d488"/>

  <!-- Scales-of-justice mark -->
