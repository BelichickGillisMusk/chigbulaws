name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Cloudflare credentials
        run: |
          missing=0
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing repository secret CLOUDFLARE_API_TOKEN. Add it under Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing repository secret CLOUDFLARE_ACCOUNT_ID. Add it under Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ "$missing" = "1" ]; then
            exit 1
          fi
          echo "Cloudflare credentials present."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=chigbulaws --branch=${{ github.ref_name == 'main' && 'main' || 'production' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
