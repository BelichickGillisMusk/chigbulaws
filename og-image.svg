    <line x1="120" y1="30" x2="120" y2="210"/>
    <line x1="44" y1="70" x2="196" y2="70"/>
    <path d="M44 70 L18 130 Q44 158 70 130 Z" fill="#f3d488" fill-opacity=".22"/>
    <path d="M196 70 L170 130 Q196 158 222 130 Z" fill="#f3d488" fill-opacity=".22"/>
