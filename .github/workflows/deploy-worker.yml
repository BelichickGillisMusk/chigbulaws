name: Deploy chigbulaws Worker

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "squarespace-export/**"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: chigbulaws-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Sync R2 then deploy Worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Require Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in GitHub repo Settings → Secrets and variables → Actions."
            echo "Token needs Workers Scripts Edit and R2 Object Read/Write on the account that owns chigbulaws.com."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Upload static assets first so the live Worker never serves an empty bucket.
      - name: Sync static site to R2 (chigbulaw)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run sync:r2

      - name: Deploy Worker (chigbulaws)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
