name = "chigbulaws"
account_id = "1FDNF6DC9MDF04634"
main = "src/index.ts"
compatibility_date = "2026-05-17"
compatibility_flags = ["nodejs_compat"]

# Custom domains: wrangler creates DNS + SSL when chigbulaws.com is in this account.
# Remove conflicting A/AAAA on @ and www before first deploy (see GO-LIVE.md).

[[routes]]
pattern = "chigbulaws.com"
custom_domain = true

[[routes]]
pattern = "www.chigbulaws.com"
custom_domain = true

[[r2_buckets]]
binding = "CHIGBULAW"
bucket_name = "chigbulaw"
