name: Deploy chigbulaws to Cloudflare Workers

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "squarespace-export/**"
      - "README.md"
      - "AGENTS.md"
      - "DEPLOYMENT.md"
      - "GO-LIVE.md"
      - "GO_LIVE.md"
  workflow_dispatch:

concurrency:
  group: chigbulaws-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy static site (Workers Static Assets)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Require Cloudflare credentials
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Add org/repo secret CLOUDFLARE_API_TOKEN: https://github.com/organizations/BelichickGillisMusk/settings/secrets/actions"
            exit 1
          fi
          if [ -z "${{ vars.CLOUDFLARE_ACCOUNT_ID }}" ] && [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Add CLOUDFLARE_ACCOUNT_ID as org variable or repo secret."
            echo "  Org variable: https://github.com/organizations/BelichickGillisMusk/settings/variables/actions"
            echo "  Repo secret:  https://github.com/BelichickGillisMusk/chigbulaws/settings/secrets/actions"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers (static assets uploaded automatically)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
