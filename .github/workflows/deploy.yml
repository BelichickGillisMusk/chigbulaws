name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
# Prefer deploy-worker.yml (Worker + R2). This workflow is a Pages fallback only.

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: chigbulaws
          directory: .
          wranglerVersion: "3"
# Add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID at:
# https://github.com/BelichickGillisMusk/chigbulaws/settings/secrets/actions
