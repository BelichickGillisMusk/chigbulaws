name = "chigbulaws"
main = "src/index.ts"
compatibility_date = "2026-05-17"
compatibility_flags = ["nodejs_compat"]

# Routes for *.chigbulaws.com are typically set in the Cloudflare dashboard.
# Do not remove existing route patterns when deploying; this file only updates Worker code + R2.

[[r2_buckets]]
binding = "CHIGBULAW"
bucket_name = "chigbulaw"
