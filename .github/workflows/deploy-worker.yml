name: Deploy silverback-google Worker

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "squarespace-export/**"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: silverback-google-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Sync R2 then deploy Worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Upload static assets first so the live Worker never serves an empty bucket.
      - name: Sync static site to R2 (chigbulaw)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run sync:r2

      - name: Deploy Worker (silverback-google)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
