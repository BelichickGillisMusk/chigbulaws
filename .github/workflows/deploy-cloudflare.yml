name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
# Pages deploy disabled — production uses Worker chigbulaws + R2 (see deploy-worker.yml).

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: chigbulaws
          directory: .
          # Optional: Enable deployment on preview branches
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
