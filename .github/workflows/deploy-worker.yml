name: Deploy chigbulaws Worker

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "squarespace-export/**"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: chigbulaws-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Sync R2 then deploy Worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Require Cloudflare credentials
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Add org/repo secret CLOUDFLARE_API_TOKEN: https://github.com/organizations/BelichickGillisMusk/settings/secrets/actions"
            exit 1
          fi
          if [ -z "${{ vars.CLOUDFLARE_ACCOUNT_ID }}" ] && [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Add org variable CLOUDFLARE_ACCOUNT_ID: https://github.com/organizations/BelichickGillisMusk/settings/variables/actions"
            echo "Or add repo secret CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

      - name: Resolve account and verify chigbulaws.com zone
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            CLOUDFLARE_ACCOUNT_ID="$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if not d.get('success') or not d.get('result'):
              raise SystemExit('Cannot list accounts: ' + str(d))
          print(d['result'][0]['id'])
          ")"
            echo "CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}" >> "${GITHUB_ENV}"
          fi
          ZONES="$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones?name=chigbulaws.com")"
          COUNT="$(echo "${ZONES}" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('result') or []))")"
          if [ "${COUNT}" -eq 0 ]; then
            echo "::error::Token cannot see zone chigbulaws.com. Use an API token from the Cloudflare account where the domain was added."
            echo "Zones visible to this token:"
            curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/zones?per_page=20" | python3 -c "
          import sys, json
          for z in json.load(sys.stdin).get('result') or []:
              print('  -', z['name'])
          " || true
            exit 1
          fi
          echo "Zone chigbulaws.com found — proceeding with deploy."

      - name: Install dependencies
        run: npm ci

      # Upload static assets first so the live Worker never serves an empty bucket.
      - name: Sync static site to R2 (chigbulaw)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run sync:r2

      - name: Deploy Worker (chigbulaws)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
